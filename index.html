<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Morning Brief</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#000; color:#fff; font-family:-apple-system,system-ui,sans-serif;
  padding:20px 16px 60px; -webkit-font-smoothing:antialiased; }
#date { text-align:center; color:#666; font-size:13px; margin-bottom:24px; }
.section { margin-bottom:28px; }
.section-title { font-size:11px; font-weight:600; letter-spacing:1.2px;
  text-transform:uppercase; color:#555; padding:0 0 10px; }
.card { display:flex; align-items:center; padding:16px 0;
  border-bottom:1px solid #1a1a1a; cursor:pointer; }
.card:active { opacity:0.6; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-right:14px; }
.dot.urgent { background:#ef4444; }
.dot.should { background:#f59e0b; }
.info { flex:1; min-width:0; }
.name { font-size:16px; font-weight:500; margin-bottom:2px; }
.preview { font-size:13px; color:#666; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; }
.x { width:44px; height:44px; display:flex; align-items:center;
  justify-content:center; color:#333; font-size:18px; flex-shrink:0;
  cursor:pointer; border-radius:50%; }
.x:active { background:#1a1a1a; color:#ef4444; }
.card.ignored { opacity:0.25; text-decoration:line-through; }
.card.ignored .x { display:none; }
.footer { text-align:center; color:#333; font-size:11px; padding-top:20px; }
</style>
</head>
<body>
<div id="date"></div>
<div id="content"></div>
<div class="footer" id="footer"></div>
<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// AES-256-GCM decrypt
async function dec(b64, hex) {
  const k = new Uint8Array(hex.match(/.{2}/g).map(h=>parseInt(h,16)));
  const d = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const key = await crypto.subtle.importKey('raw',k,'AES-GCM',false,['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:d.slice(0,12)},key,d.slice(12));
  return new TextDecoder().decode(plain);
}

// Ignore state
function gi() { try{return JSON.parse(localStorage.getItem('i')||'{}')}catch{return{}} }
function si(s,id) { const g=gi();if(!g[s])g[s]=[];if(!g[s].includes(id))g[s].push(id);localStorage.setItem('i',JSON.stringify(g)); }
function ii(s,id) { return (gi()[s]||[]).includes(id); }

// Open link — use tg.openLink for Gmail (external browser), location.href for tg://
function go(url) {
  if (!url) return;
  if (url.startsWith('tg://')) {
    if (tg && url.includes('resolve?domain=')) {
      tg.openTelegramLink('https://t.me/' + url.split('domain=')[1]);
    } else {
      window.location.href = url;
    }
  } else if (tg) {
    tg.openLink(url, {try_instant_view: false});
  } else {
    window.open(url, '_blank');
  }
}

function card(item, src) {
  const ig = ii(src, item.id);
  const ur = item.urgency === '🔴';
  const d = document.createElement('div');
  d.className = 'card' + (ig?' ignored':'');

  const dot = document.createElement('div');
  dot.className = 'dot ' + (ur?'urgent':'should');

  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `<div class="name">${item.short_name}</div>
    <div class="preview">${item.label.replace(item.short_name,'').replace(/^[\s:—]+/,'').trim()}</div>`;

  // Whole card is tappable for opening
  d.onclick = () => { if (!ig && item.url) go(item.url); };

  d.appendChild(dot);
  d.appendChild(info);

  if (!ig) {
    const x = document.createElement('div');
    x.className = 'x';
    x.textContent = '×';
    x.onclick = (e) => {
      e.stopPropagation();
      si(src, item.id);
      d.classList.add('ignored');
      x.remove();
    };
    d.appendChild(x);
  }

  return d;
}

function section(emoji, title, items, src) {
  if (!items || !items.length) return null;
  const v = items.filter(i => !ii(src, i.id));
  const h = items.filter(i => ii(src, i.id));
  if (!v.length && !h.length) return null;

  const s = document.createElement('div');
  s.className = 'section';
  const t = document.createElement('div');
  t.className = 'section-title';
  t.textContent = `${emoji}  ${title}`;
  s.appendChild(t);

  v.forEach(i => s.appendChild(card(i, src)));
  h.forEach(i => s.appendChild(card(i, src)));
  return s;
}

function render(data) {
  document.getElementById('date').textContent = data.date || 'heute';
  const c = document.getElementById('content');
  c.innerHTML = '';

  const s1 = section('📬', 'Goldene Krone', data.krone, 'email');
  const s2 = section('✉️', 'E-Mail', data.email, 'email');
  const s3 = section('💬', 'Telegram', data.telegram, 'telegram');
  const s4 = section('📱', 'iMessage', data.imessage, 'imessage');

  if (s1) c.appendChild(s1);
  if (s2) c.appendChild(s2);
  if (s3) c.appendChild(s3);
  if (s4) c.appendChild(s4);

  const st = data.stats || {};
  document.getElementById('footer').textContent =
    `${st.urgent||0} dringend · ${st.total||0} gesamt · ${st.cost||'~$0.10'}`;
}

async function load() {
  try {
    const qp = new URLSearchParams(location.search);
    const hp = new URLSearchParams(location.hash.slice(1));
    const key = qp.get('k') || hp.get('key');
    if (!key) throw new Error('No key');

    const r = await fetch('data.enc?t='+Date.now());
    if (!r.ok) throw new Error('No data');
    const json = await dec((await r.text()).trim(), key);
    render(JSON.parse(json));
  } catch(e) {
    document.getElementById('date').textContent = 'Keine Daten vorhanden.';
  }
}
load();
</script>
</body>
</html>
