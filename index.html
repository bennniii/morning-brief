<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Morning Brief</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-ignored: #12121f;
  --text: #eaeaea;
  --text-dim: #6b7280;
  --urgent: #ef4444;
  --urgent-bg: rgba(239,68,68,0.1);
  --should: #f59e0b;
  --should-bg: rgba(245,158,11,0.1);
  --link: #60a5fa;
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
  --ignore-bg: rgba(255,255,255,0.05);
}
</style>
</head>
<body style="background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro',sans-serif;padding:0 16px 32px;-webkit-font-smoothing:antialiased;">
<div id="app"></div>
<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// Read data from URL hash (base64-encoded JSON)
let briefData = {};
try {
  const hash = location.hash.slice(1);
  if (hash) briefData = JSON.parse(decodeURIComponent(atob(hash)));
} catch(e) {
  document.getElementById('app').innerHTML = '<p style="padding:40px;text-align:center;color:var(--text-dim)">Keine Daten vorhanden.</p>';
}

// Ignored items stored in localStorage
const IGNORED_KEY = 'morning_brief_ignored';
function getIgnored() {
  try { return JSON.parse(localStorage.getItem(IGNORED_KEY) || '{}'); }
  catch { return {}; }
}
function setIgnored(data) { localStorage.setItem(IGNORED_KEY, JSON.stringify(data)); }
function isIgnored(source, id) { return (getIgnored()[source] || []).includes(id); }
function ignoreItem(source, id) {
  const ign = getIgnored();
  if (!ign[source]) ign[source] = [];
  if (!ign[source].includes(id)) ign[source].push(id);
  setIgnored(ign);
  // Also notify bot via sendData
  if (tg) {
    try { tg.sendData(JSON.stringify({action:'ignore', source, id})); } catch(e) {}
  }
}

function openLink(url) {
  if (!url) return;
  if (tg && url.startsWith('tg://')) {
    // Use Telegram's native link opener
    tg.openTelegramLink('https://t.me/' + url.replace('tg://resolve?domain=','').replace('tg://user?id=','?id='));
  } else if (tg) {
    tg.openLink(url);
  } else {
    window.open(url, '_blank');
  }
}

function renderItem(item, source, container) {
  const ignored = isIgnored(source, item.id);
  const el = document.createElement('div');
  el.style.cssText = `
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    background:${ignored ? 'var(--card-ignored)' : 'var(--card)'};
    border-radius:var(--radius); margin-bottom:8px;
    border-left:3px solid ${item.urgency === '🔴' ? 'var(--urgent)' : 'var(--should)'};
    opacity:${ignored ? '0.4' : '1'}; transition:all 0.3s ease;
    ${ignored ? 'text-decoration:line-through;' : ''}
  `;

  const content = document.createElement('div');
  content.style.cssText = 'flex:1; min-width:0; cursor:pointer;';
  content.onclick = () => { if (item.url && !ignored) openLink(item.url); };

  const name = document.createElement('div');
  name.style.cssText = `font-weight:600; font-size:15px; color:${item.url ? 'var(--link)' : 'var(--text)'}; margin-bottom:3px;`;
  name.textContent = item.short_name;

  const desc = document.createElement('div');
  desc.style.cssText = 'font-size:13px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;';
  desc.textContent = item.label.replace(item.short_name + ':', '').replace(item.short_name, '').trim();

  content.appendChild(name);
  content.appendChild(desc);
  el.appendChild(content);

  if (!ignored) {
    const btn = document.createElement('button');
    btn.textContent = '✕';
    btn.title = 'Ignorieren';
    btn.style.cssText = `
      width:36px; height:36px; border-radius:50%; border:none;
      background:var(--ignore-bg); color:var(--text-dim); font-size:16px;
      cursor:pointer; flex-shrink:0; transition:all 0.2s;
    `;
    btn.onmouseenter = () => { btn.style.background='rgba(239,68,68,0.2)'; btn.style.color='var(--urgent)'; };
    btn.onmouseleave = () => { btn.style.background='var(--ignore-bg)'; btn.style.color='var(--text-dim)'; };
    btn.onclick = (e) => {
      e.stopPropagation();
      ignoreItem(source, item.id);
      el.style.opacity = '0.4';
      el.style.textDecoration = 'line-through';
      btn.remove();
    };
    el.appendChild(btn);
  }

  container.appendChild(el);
}

function renderSection(title, emoji, items, source, app) {
  if (!items || items.length === 0) return;
  const visible = items.filter(i => !isIgnored(source, i.id));
  const ignoredCount = items.length - visible.length;

  const section = document.createElement('div');
  section.style.cssText = 'margin-bottom:24px;';

  const header = document.createElement('div');
  header.style.cssText = 'display:flex; align-items:center; gap:8px; margin-bottom:12px; padding:0 4px;';
  header.innerHTML = `<span style="font-size:18px">${emoji}</span><span style="font-weight:700;font-size:15px;letter-spacing:0.3px;text-transform:uppercase;color:var(--text-dim)">${title}</span>`;
  if (ignoredCount > 0) {
    header.innerHTML += `<span style="font-size:12px;color:var(--text-dim);margin-left:auto">${ignoredCount} ignoriert</span>`;
  }
  section.appendChild(header);

  // Show non-ignored first, then ignored
  visible.forEach(item => renderItem(item, source, section));
  items.filter(i => isIgnored(source, i.id)).forEach(item => renderItem(item, source, section));

  app.appendChild(section);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'text-align:center; padding:28px 0 24px;';
  header.innerHTML = `
    <div style="font-size:36px; margin-bottom:8px">☀️</div>
    <div style="font-size:22px; font-weight:700; letter-spacing:-0.3px">Morning Brief</div>
    <div style="font-size:14px; color:var(--text-dim); margin-top:4px">${briefData.date || 'heute'}</div>
  `;
  app.appendChild(header);

  // Urgent count banner
  const stats = briefData.stats || {};
  if (stats.urgent > 0) {
    const banner = document.createElement('div');
    banner.style.cssText = `
      background:var(--urgent-bg); border:1px solid rgba(239,68,68,0.2);
      border-radius:var(--radius); padding:12px 16px; margin-bottom:24px;
      text-align:center; font-size:14px; font-weight:600;
    `;
    banner.innerHTML = `<span style="color:var(--urgent)">${stats.urgent} dringend</span><span style="color:var(--text-dim)"> von ${stats.total} Nachrichten</span>`;
    app.appendChild(banner);
  }

  // Sections
  renderSection('Goldene Krone', '📬', briefData.krone, 'email', app);
  renderSection('E-Mail', '✉️', briefData.email, 'email', app);
  renderSection('Telegram', '💬', briefData.telegram, 'telegram', app);
  if (briefData.imessage && briefData.imessage.length > 0) {
    renderSection('iMessage', '📱', briefData.imessage, 'imessage', app);
  }

  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'text-align:center; padding:16px 0; font-size:12px; color:var(--text-dim);';
  footer.innerHTML = `💰 ${stats.cost || '~$0.10'} · ${stats.tokens || '~30k tokens'}`;
  app.appendChild(footer);
}

if (briefData.date) render();
</script>
</body>
</html>
